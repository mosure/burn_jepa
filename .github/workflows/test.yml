name: test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: checkout repository
        uses: actions/checkout@v5

      - name: setup nightly rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy,rustfmt
          targets: wasm32-unknown-unknown

      - name: cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: format
        run: cargo fmt --all -- --check

      - name: test root crate
        run: cargo test --workspace --locked

      - name: test ndarray-only feature set
        run: cargo test --workspace --locked --no-default-features --features ndarray

      - name: test benchmark and docs guardrails
        run: cargo test --locked --test benchmark_report

      - name: clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: clippy ndarray-only feature set
        run: cargo clippy --workspace --all-targets --locked --no-default-features --features ndarray -- -D warnings

      - name: validate workspace package metadata
        run: cargo metadata --locked --format-version 1 --no-deps

      - name: package burn_anyup
        run: cargo package -p burn_anyup --locked

      - name: benchmark smoke
        run: cargo bench --bench sparse_pipeline --locked --no-default-features --features ndarray -- --test

      - name: high-res pipeline benchmark smoke
        run: cargo bench --bench highres_anyup_pca_pipeline --locked --no-default-features --features ndarray -- --test

      - name: check wasm api
        run: cargo check --locked --target wasm32-unknown-unknown --no-default-features --features wasm

      - name: check bevy
        run: cargo check -p bevy_jepa --locked

      - name: check bevy wasm
        run: cargo check -p bevy_jepa --locked --target wasm32-unknown-unknown

      - name: check bevy sparse patchify path
        run: cargo check -p bevy_jepa --locked --features sparse-patchify-wgpu

      - name: check bevy static page
        run: cd crates/bevy_jepa && node tests/static-source.spec.mjs
