<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>burn_jepa sparse feature viewer</title>
    <style>
      :root {
        color: #f8fafc;
        background: #0a0f12;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      }
      html,
      body,
      #bevy-root {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }
      #status {
        position: fixed;
        left: 14px;
        bottom: 12px;
        z-index: 4;
        color: #cbd5e1;
        font-size: 13px;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #webcam {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="bevy-root">
      <canvas id="bevy"></canvas>
    </div>
    <video id="webcam" autoplay muted playsinline></video>
    <div id="status">loading bevy_jepa...</div>
    <script type="module">
      import init, {
        anyup_model_package_input,
        frame_input,
        jepa_model_package_input,
      } from "./out/bevy_jepa.js";

      const status = document.querySelector("#status");
      const video = document.querySelector("#webcam");
      const params = new URLSearchParams(window.location.search);
      const defaultModelRoot =
        "https://aberration.technology/model/burn_jepa";
      const defaultModelProfile = "vjepa2_1_ttt";
      const defaultAnyupRoot =
        "https://aberration.technology/model/burn_anyup";
      const defaultAnyupProfile = "anyup_multi_backbone";
      window.__jepaFrameStats = {
        count: 0,
        firstFrameMs: null,
        lastFrameMs: null,
        lastWidth: 0,
        lastHeight: 0,
      };
      window.__jepaWasmReady = false;
      window.__jepaWebGpuAvailable = false;

      async function boot() {
        try {
          logStatus("booting bevy_jepa wasm viewer");
          window.__jepaWebGpuAvailable = await webGpuAdapterAvailable();
          if (!window.__jepaWebGpuAvailable) {
            if (modelLoadingEnabled() && hasExplicitModelPackage()) {
              await preloadModelPackage();
            }
            if (anyupPackageShouldPreload()) {
              await preloadAnyupModelPackage();
            }
            window.__jepaWasmSkipped = "WebGPU unavailable";
            setStatus("bevy_jepa WebGPU unavailable; source preview running without inference");
            await startFrameSource();
            return;
          }
          if (modelLoadingEnabled()) {
            await preloadModelPackage();
            if (anyupPackageShouldPreload()) {
              await preloadAnyupModelPackage();
            }
          } else {
            setStatus("bevy_jepa model load disabled");
          }
          if (preloadOnly()) {
            window.__jepaPreloadOnly = true;
            setStatus("bevy_jepa model package preload complete");
            return;
          }
          await init();
          window.__jepaWasmReady = true;
          logStatus("bevy_jepa wasm initialized");
          await startFrameSource();
        } catch (error) {
          errorStatus("runtime error", error);
        }
      }

      function modelLoadingEnabled() {
        const value = params.get("load-model");
        if (value == null) {
          return true;
        }
        return !["0", "false", "no", "off"].includes(value.toLowerCase());
      }

      function preloadOnly() {
        const value = params.get("preload-only");
        return value != null && !["0", "false", "no", "off"].includes(value.toLowerCase());
      }

      async function webGpuAdapterAvailable() {
        if (!navigator.gpu) {
          return false;
        }
        try {
          return Boolean(await navigator.gpu.requestAdapter());
        } catch {
          return false;
        }
      }

      function hasExplicitModelPackage() {
        return (
          params.has("model-manifest") ||
          params.has("model-manifest-url") ||
          params.has("model-base") ||
          params.has("model-base-url") ||
          params.has("model-profile") ||
          params.has("model-name") ||
          params.has("model-type")
        );
      }

      async function preloadModelPackage() {
        const manifestUrl = modelManifestUrl();
        logStatus(`loading model package ${manifestUrl}`);
        setStatus("bevy_jepa loading model package...");
        try {
          const manifest = await fetchJson(manifestUrl);
          const partsManifestUrl = resolvePartsManifestUrl(manifestUrl, manifest);
          const partsManifest = await fetchJson(partsManifestUrl);
          const parts = [];
          const partEntries = partsManifest.parts ?? [];
          for (const [index, part] of partEntries.entries()) {
            const partUrl = joinUrl(parentUrl(partsManifestUrl), part.path);
            parts.push(await fetchBytes(partDownloadUrl(partUrl, part), `model shard ${index + 1}/${partEntries.length}`));
          }
          window.__burnJepaModelPackage = {
            manifestJson: JSON.stringify(manifest),
            parts,
          };
          window.__jepaModelPackageStats = {
            manifestUrl,
            partsManifestUrl,
            parts: parts.length,
            bytes: parts.reduce((sum, bytes) => sum + bytes.byteLength, 0),
          };
          setStatus(`bevy_jepa model package loaded (${parts.length} shard${parts.length === 1 ? "" : "s"})`);
        } catch (error) {
          window.__burnJepaModelPackageError = error?.message ?? String(error);
          warnStatus("bevy_jepa model package unavailable", error);
          throw error;
        }
      }

      function anyupPackageRequired() {
        return hasExplicitAnyupPackage() || anyupLoadingExplicitlyEnabled() || anyupHighResRequested();
      }

      function anyupPackageShouldPreload() {
        if (anyupLoadingExplicitlyDisabled()) {
          return false;
        }
        return modelLoadingEnabled() || anyupPackageRequired();
      }

      function anyupLoadingExplicitlyEnabled() {
        const value = params.get("load-anyup");
        return value != null && !["0", "false", "no", "off"].includes(value.toLowerCase());
      }

      function anyupLoadingExplicitlyDisabled() {
        const value = params.get("load-anyup");
        return value != null && ["0", "false", "no", "off"].includes(value.toLowerCase());
      }

      function anyupHighResRequested() {
        const highResEvery = Number(params.get("high-res-pca-every") ?? "0");
        return Number.isFinite(highResEvery) && highResEvery > 0;
      }

      function hasExplicitAnyupPackage() {
        return (
          params.has("anyup-model-manifest") ||
          params.has("anyup-model-manifest-url") ||
          params.has("anyup-model-base") ||
          params.has("anyup-model-base-url") ||
          params.has("anyup-model-profile") ||
          params.has("anyup-model-name")
        );
      }

      async function preloadAnyupModelPackage() {
        const manifestUrl = anyupManifestUrl();
        logStatus(`loading AnyUp package ${manifestUrl}`);
        try {
          const manifest = await fetchJson(manifestUrl);
          const partsManifestUrl = resolvePartsManifestUrl(manifestUrl, manifest, "anyup.bpk");
          const partsManifest = await fetchJson(partsManifestUrl);
          const parts = [];
          const partEntries = partsManifest.parts ?? [];
          for (const [index, part] of partEntries.entries()) {
            const partUrl = joinUrl(parentUrl(partsManifestUrl), part.path);
            parts.push(await fetchBytes(partDownloadUrl(partUrl, part), `AnyUp shard ${index + 1}/${partEntries.length}`));
          }
          window.__burnAnyupModelPackage = {
            manifestJson: JSON.stringify(manifest),
            parts,
          };
          window.__jepaAnyupModelPackageStats = {
            manifestUrl,
            partsManifestUrl,
            parts: parts.length,
            bytes: parts.reduce((sum, bytes) => sum + bytes.byteLength, 0),
          };
          logStatus(`AnyUp package loaded (${parts.length} shard${parts.length === 1 ? "" : "s"})`);
        } catch (error) {
          window.__burnAnyupModelPackageError = error?.message ?? String(error);
          warnStatus("bevy_jepa AnyUp package unavailable", error);
          if (anyupPackageRequired()) {
            throw error;
          }
        }
      }

      function modelManifestUrl() {
        const explicit = params.get("model-manifest") || params.get("model-manifest-url");
        if (explicit) {
          return explicit;
        }
        const base = params.get("model-base") || params.get("model-base-url");
        if (base) {
          return joinUrl(base, "manifest.json");
        }
        return joinUrl(joinUrl(defaultModelRoot, modelProfile()), "manifest.json");
      }

      function anyupManifestUrl() {
        const explicit =
          params.get("anyup-model-manifest") ||
          params.get("anyup-model-manifest-url");
        if (explicit) {
          return explicit;
        }
        const base =
          params.get("anyup-model-base") ||
          params.get("anyup-model-base-url");
        if (base) {
          return joinUrl(base, "manifest.json");
        }
        return joinUrl(joinUrl(defaultAnyupRoot, anyupProfile()), "manifest.json");
      }

      function anyupProfile() {
        const raw =
          params.get("anyup-model-profile") ||
          params.get("anyup-model-name") ||
          defaultAnyupProfile;
        switch (raw.trim().toLowerCase()) {
          case "anyup_multi_backbone":
          case "anyup-multi-backbone":
          case "multi_backbone":
          case "multi-backbone":
          case "default":
          case "paper":
            return "anyup_multi_backbone";
          default:
            throw new Error(`unsupported anyup-model-profile ${raw}`);
        }
      }

      function modelProfile() {
        const raw =
          params.get("model-profile") ||
          params.get("model-name") ||
          params.get("model-type") ||
          defaultModelProfile;
        switch (raw.trim().toLowerCase()) {
          case "base":
          case "vjepa-base":
          case "vjepa21-base":
          case "vjepa2.1-base":
          case "vjepa2_1_base":
            return "vjepa2_1_base";
          case "ttt":
          case "trained-ttt":
          case "production-ttt":
          case "vjepa-ttt":
          case "vjepa21-ttt":
          case "vjepa2.1-ttt":
          case "vjepa2_1_ttt":
            return "vjepa2_1_ttt";
          default:
            throw new Error(`unsupported model-profile ${raw}`);
        }
      }

      function resolvePartsManifestUrl(manifestUrl, manifest, defaultBurnpack = "jepa.bpk") {
        const partsManifest =
          manifest.parts_manifest ||
          manifest.partsManifest ||
          manifest.model?.parts_manifest ||
          manifest.model?.partsManifest;
        if (partsManifest) {
          return joinUrl(parentUrl(manifestUrl), partsManifest);
        }
        const burnpack =
          manifest.burnpack || manifest.model?.burnpack || defaultBurnpack;
        return joinUrl(parentUrl(manifestUrl), `${burnpack}.parts.json`);
      }

      async function fetchJson(url) {
        const response = await fetch(url, { cache: "no-cache" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status} while fetching ${url}`);
        }
        return response.json();
      }

      function partDownloadUrl(url, part) {
        if (!part?.sha256) {
          return url;
        }
        const separator = url.includes("?") ? "&" : "?";
        return `${url}${separator}sha256=${encodeURIComponent(part.sha256)}`;
      }

      async function fetchBytes(url, label = "model shard") {
        logStatus(`downloading ${label} ${url}`);
        setStatus(`bevy_jepa downloading ${label}...`);
        const response = await fetch(url, { cache: "no-cache" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status} while fetching ${url}`);
        }
        const expected = Number(response.headers.get("content-length") || 0);
        if (!response.body) {
          const bytes = new Uint8Array(await response.arrayBuffer());
          logStatus(`downloaded ${label} (${formatBytes(bytes.byteLength)})`);
          return bytes;
        }
        const reader = response.body.getReader();
        const chunks = [];
        let received = 0;
        let nextLog = 8 * 1024 * 1024;
        while (true) {
          const { done, value } = await reader.read();
          if (done) {
            break;
          }
          chunks.push(value);
          received += value.byteLength;
          if (received >= nextLog) {
            const progress = formatDownloadProgress(received, expected);
            logStatus(`downloading ${label}: ${progress}`);
            setStatus(`bevy_jepa downloading ${label}: ${progress}`);
            nextLog = received + 8 * 1024 * 1024;
          }
        }
        const bytes = new Uint8Array(received);
        let offset = 0;
        for (const chunk of chunks) {
          bytes.set(chunk, offset);
          offset += chunk.byteLength;
        }
        const progress = formatDownloadProgress(received, expected);
        logStatus(`downloaded ${label}: ${progress}`);
        setStatus(`bevy_jepa downloaded ${label}: ${progress}`);
        return bytes;
      }

      function formatDownloadProgress(received, expected) {
        if (expected > 0) {
          const percent = Math.min(100, Math.max(0, (received / expected) * 100));
          return `${formatBytes(received)} / ${formatBytes(expected)} (${percent.toFixed(1)}%)`;
        }
        return `${formatBytes(received)} downloaded`;
      }

      function formatBytes(bytes) {
        if (bytes >= 1024 * 1024 * 1024) {
          return `${(bytes / (1024 * 1024 * 1024)).toFixed(2)} GiB`;
        }
        if (bytes >= 1024 * 1024) {
          return `${(bytes / (1024 * 1024)).toFixed(1)} MiB`;
        }
        if (bytes >= 1024) {
          return `${(bytes / 1024).toFixed(1)} KiB`;
        }
        return `${bytes} B`;
      }

      function parentUrl(url) {
        return url.slice(0, Math.max(0, url.lastIndexOf("/")));
      }

      function joinUrl(base, child) {
        if (/^https?:\/\//i.test(child)) {
          return child;
        }
        return `${base.replace(/\/+$/, "")}/${child.replace(/^\/+/, "")}`;
      }

      async function startFrameSource() {
        if (usesStaticSource()) {
          await startStaticSource();
        } else if (usesCameraSource()) {
          await startCameraSource();
        } else {
          throw new Error(
            `unsupported wasm frame source: ${params.get("source")}; expected camera or static`,
          );
        }
      }

      function usesStaticSource() {
        const source = params.get("source")?.toLowerCase();
        return (
          source === "static" ||
          source === "image" ||
          params.has("image-url") ||
          params.has("static-frame")
        );
      }

      function usesCameraSource() {
        const source = params.get("source")?.toLowerCase();
        return (
          source == null ||
          source === "camera" ||
          source === "webcam" ||
          source === "cam" ||
          source === "live"
        );
      }

      async function startCameraSource() {
        try {
          setStatus("bevy_jepa requesting camera source...");
          const width = queryNumber(["camera-width", "width"], 256, 3840, 640);
          const height = queryNumber(["camera-height", "height"], 256, 2160, 512);
          const stream = await navigator.mediaDevices.getUserMedia({
            video: {
              width: { ideal: width },
              height: { ideal: height },
              frameRate: { ideal: 30, max: 30 },
            },
            audio: false,
          });
          video.srcObject = stream;
          await video.play();
          logStatus(
            `camera stream started ${video.videoWidth || width}x${video.videoHeight || height}`,
          );
          setStatus("bevy_jepa camera source running");

          if (params.get("camera-reader") === "processor" && "MediaStreamTrackProcessor" in window) {
            const [track] = stream.getVideoTracks();
            const processor = new MediaStreamTrackProcessor(track);
            const fallbackToCanvas = () => {
              const capture = document.createElement("canvas");
              const context = capture.getContext("2d", { willReadFrequently: true });
              captureWithCanvas(capture, context);
            };
            readVideoFrames(processor.readable.getReader(), fallbackToCanvas).catch((error) => {
              warnStatus("camera processor failed; falling back to canvas capture", error);
              fallbackToCanvas();
            });
          } else {
            const capture = document.createElement("canvas");
            const context = capture.getContext("2d", { willReadFrequently: true });
            captureWithCanvas(capture, context);
          }
        } catch (error) {
          warnStatus("camera source unavailable", error);
        }
      }

      async function startStaticSource() {
        const frame = await loadStaticFrame();
        const fps = clampNumber(params.get("static-fps"), 1, 60, 15);
        const frameInterval = 1000 / fps;
        let lastFrame = 0;
        setStatus("bevy_jepa static source running");

        function pump(now) {
          if (now - lastFrame >= frameInterval) {
            submitFrame(frame.data, frame.width, frame.height);
            lastFrame = now;
          }
          requestAnimationFrame(pump);
        }

        requestAnimationFrame(pump);
      }

      async function loadStaticFrame() {
        const imageUrl = params.get("image-url");
        if (imageUrl) {
          return loadImageFrame(imageUrl);
        }

        const width = queryNumber(["static-width", "width"], 256, 3840, 512);
        const height = queryNumber(["static-height", "height"], 256, 2160, 512);
        return generatedFrame(width, height);
      }

      async function loadImageFrame(url) {
        const image = new Image();
        image.crossOrigin = "anonymous";
        image.decoding = "async";
        image.src = url;
        await image.decode();

        const canvas = document.createElement("canvas");
        canvas.width = image.naturalWidth || image.width;
        canvas.height = image.naturalHeight || image.height;
        const context = canvas.getContext("2d", { willReadFrequently: true });
        context.drawImage(image, 0, 0, canvas.width, canvas.height);
        const pixels = context.getImageData(0, 0, canvas.width, canvas.height);
        return {
          data: new Uint8Array(pixels.data),
          width: canvas.width,
          height: canvas.height,
        };
      }

      function generatedFrame(width, height) {
        const data = new Uint8Array(width * height * 4);
        for (let y = 0; y < height; y += 1) {
          for (let x = 0; x < width; x += 1) {
            const offset = (y * width + x) * 4;
            const checker = ((x >> 5) + (y >> 5)) & 1;
            data[offset] = Math.round((x / Math.max(1, width - 1)) * 220 + checker * 24);
            data[offset + 1] = Math.round((y / Math.max(1, height - 1)) * 220 + 20);
            data[offset + 2] = checker ? 230 : 92;
            data[offset + 3] = 255;
          }
        }
        return { data, width, height };
      }

      async function readVideoFrames(reader, fallbackToCanvas) {
        const { value: frame, done } = await reader.read();
        if (done) {
          return;
        }
        const format = "RGBA";
        const pixelBuffer = new Uint8Array(frame.allocationSize({ format }));
        try {
          await frame.copyTo(pixelBuffer, { format });
          submitFrame(pixelBuffer, frame.displayWidth, frame.displayHeight);
        } finally {
          frame.close();
        }
        requestAnimationFrame(() => {
          readVideoFrames(reader, fallbackToCanvas).catch((error) => {
            warnStatus("camera processor failed; falling back to canvas capture", error);
            fallbackToCanvas();
          });
        });
      }

      function captureWithCanvas(canvas, context) {
        if (video.videoWidth > 0 && video.videoHeight > 0) {
          if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            logStatus(`camera canvas capture ${canvas.width}x${canvas.height}`);
          }
          context.drawImage(video, 0, 0, canvas.width, canvas.height);
          const image = context.getImageData(0, 0, canvas.width, canvas.height);
          submitFrame(new Uint8Array(image.data), canvas.width, canvas.height);
        }
        requestAnimationFrame(() => captureWithCanvas(canvas, context));
      }

      function submitFrame(data, width, height) {
        if (!data || width <= 0 || height <= 0 || data.length !== width * height * 4) {
          warnStatus(
            `dropping invalid frame ${width}x${height} bytes=${data?.length ?? 0}`,
          );
          return;
        }
        if (window.__jepaWasmReady) {
          frame_input(data, width, height);
        }
        const stats = window.__jepaFrameStats;
        const now = performance.now();
        stats.count += 1;
        stats.firstFrameMs ??= now;
        stats.lastFrameMs = now;
        stats.lastWidth = width;
        stats.lastHeight = height;
      }

      function setStatus(message) {
        status.textContent = message;
      }

      function logStatus(message) {
        console.log(`[bevy_jepa] ${message}`);
      }

      function warnStatus(message, error = undefined) {
        const detail = error?.message ?? error;
        window.__jepaLastError = detail ? `${message}: ${detail}` : message;
        console.warn(`[bevy_jepa] ${message}`, error ?? "");
        setStatus(`${message}; see console`);
      }

      function errorStatus(message, error = undefined) {
        const detail = error?.message ?? error;
        window.__jepaLastError = detail ? `${message}: ${detail}` : message;
        console.error(`[bevy_jepa] ${message}`, error ?? "");
        setStatus(`${message}; see console`);
      }

      function clampNumber(value, min, max, fallback) {
        const number = Number.parseInt(value, 10);
        if (!Number.isFinite(number)) {
          return fallback;
        }
        return Math.min(max, Math.max(min, number));
      }

      function queryNumber(names, min, max, fallback) {
        for (const name of names) {
          if (params.has(name)) {
            return clampNumber(params.get(name), min, max, fallback);
          }
        }
        return fallback;
      }

      boot();
    </script>
  </body>
</html>
