<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>burn_jepa sparse feature viewer</title>
    <style>
      :root {
        color: #f8fafc;
        background: #0a0f12;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      }
      html,
      body,
      #bevy-root {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }
      #status {
        position: fixed;
        left: 14px;
        bottom: 12px;
        z-index: 4;
        color: #cbd5e1;
        font-size: 13px;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="bevy-root">
      <canvas id="bevy"></canvas>
    </div>
    <div id="status">loading bevy_jepa...</div>
    <script type="module">
      const status = document.querySelector("#status");
      async function boot() {
        try {
          const module = await import("./out/bevy_jepa.js");
          await module.default();
          status.textContent =
            "bevy_jepa running; press space to switch sparse mask source";
        } catch (error) {
          console.error(error);
          status.textContent = `runtime error: ${error?.message ?? error}`;
        }
      }
      boot();
    </script>
  </body>
</html>
