[model]
checkpoint_dir = "/home/mosure/.cache/burn_jepa/vjepa2_1_vitb_dist_vitG_384"
teacher_checkpoint_dir = "/home/mosure/.cache/burn_jepa/vjepa2_1_vitb_dist_vitG_384"
config_path = "/home/mosure/.cache/burn_jepa/vjepa2_1_vitb_dist_vitG_384/config.json"
weights_name = "model.pt"
ttt_checkpoint_path = "target/burn-jepa-production-final-256/stage1-stream-tbptt-longstable/ttt-model.mpk"
output_dir = "target/burn-jepa-production-final-256/stage1-stream-tbptt-carry-forever-alibi"
save_model = true
save_best_model = true
best_checkpoint_selection = "deploy_rollout"

[dataset]
kind = "manifest"
sample_kind = "video"
train_manifest = "target/burn-jepa-production-final-256/data/train-real-autogaze.jsonl"
eval_manifest = "target/burn-jepa-production-final-256/data/eval-real-autogaze.jsonl"
frames = 16
stride = 1
image_size = 256
synthetic_len = 1
repeat_count = 16
repeat_mode = "continuous_streams"

[ttt]
layer_placement = "explicit"
layers = [3, 7, 11]
predictor_layers = []
chunk_tokens = 196
ttt_lr = 0.003
use_projection = true
conv_kernel = 3
memory_update = "self_hidden"
memory_dynamics = "memory_alibi"
memory_alibi_half_lives = [8, 64, 512]
memory_alibi_read_weights = [0.45, 0.35, 0.20]
memory_alibi_update_weights = [1.0, 1.0, 1.0]
memory_clip_rms = 16.0
supervision = "final_teacher"
hybrid_final_steps = 1
rollout_blocks = 2
rollout_chunk_frames = 16
backprop_mode = "final_feature"
backprop_truncate_blocks = 1
freeze_pretrained = true

[training]
backend = "cuda"
batch_size = 2
max_steps = 512
learning_rate = 0.00000075
weight_decay = 0.0
gradient_clip_norm = 0.5
context_keep_ratio = 0.75
sparse_rollout = "context_mask"
sparse_patchify_training = "frozen_sparse_patchify"
batching = "packed_streams"
loss_trace_interval = 16
eval_steps = 0
eval_batch_size = 2
eval_full_grid = false
eval_utilization_diagnostics = false
eval_temporal_diagnostics = false
eval_feature_stability_diagnostics = false
cache_teacher_tokens = true
teacher_cache_max_entries = 1024
prefetch_batches = true
save_steps = 128

[training.stream]
enabled = true
detach_between_steps = true
reset_on_clip_change = false
reset_on_scene_change = false
reset_on_non_monotonic_start = false
reset_interval_steps = 0
state_decay = 1.0
state_l2_weight = 0.000002
update_l2_weight = 0.00004
state_regularization_width = 64

[training.stream.curriculum]
enabled = false

[training.dense_samples]
enabled = true
warmup_steps = 64
interval_steps = 64

[training.lr_schedule]
kind = "linear_warmup_cosine"
warmup_steps = 96
min_learning_rate = 0.0000001

[training.mask]
kind = "manifest_precomputed_masks"

[loss]
feature_loss_weight = 1.0
predictor_loss_weight = 0.0

[loss.latent_regularization]
weight = 0.00001
mean_weight = 1.0
variance_weight = 1.0
covariance_weight = 0.25
target_variance = 1.0
covariance_sketch_dim = 64
